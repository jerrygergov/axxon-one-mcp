name: ci

"on":
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-mcp.txt
      - run: python3.12 -m pip install -r tools/requirements-mcp.txt
      - run: python3.12 -m pip check
      - run: python3.12 -m unittest discover -s tools/tests -v
      - run: python3.12 tools/verify_mcp_startup.py
      - run: python3.12 tools/axxon_corpus_restamp.py --check
      - run: python3.12 tools/generate_coverage.py --check
      - run: python3.12 -m unittest discover -s customer-templates/python-reference -p "test*.py" -v

  node-reference:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customer-templates/node-reference
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: customer-templates/node-reference/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
