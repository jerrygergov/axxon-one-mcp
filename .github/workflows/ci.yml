name: customer-release-foundation

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-mcp.txt
      - name: Install exact runtime dependencies
        run: python3.12 -m pip install -r tools/requirements-mcp.txt
      - name: Check installed dependencies
        run: python3.12 -m pip check
      - name: Run complete offline Python suite
        run: python3.12 -m unittest discover -s tools/tests -v
      - name: Verify real MCP startup profiles
        run: python3.12 tools/verify_mcp_startup.py
      - name: Check corpus evidence restamp
        run: python3.12 tools/axxon_corpus_restamp.py --check
      - name: Check generated coverage
        run: python3.12 tools/generate_coverage.py --check
      - name: Test committed Python reference
        run: python3.12 -m unittest discover -s customer-templates/python-reference -p 'test*.py' -v

  node-reference:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: customer-templates/node-reference/package-lock.json
      - name: Install locked Node reference dependencies
        working-directory: customer-templates/node-reference
        run: npm ci
      - name: Build Node reference
        working-directory: customer-templates/node-reference
        run: npm run build
      - name: Test Node reference
        working-directory: customer-templates/node-reference
        run: npm test
